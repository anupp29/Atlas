site_name: ATLAS Documentation
site_description: >-
  ATLAS — Autonomous AIOps platform for Managed Service Providers.
  Detects failures before users notice, finds root cause in seconds,
  and resolves incidents autonomously under governed, auditable control.
site_author: ATLAS Engineering
site_url: https://anupp29.github.io/Atlas/
repo_name: Atlas
repo_url: https://github.com/anupp29/Atlas
edit_uri: edit/main/atlas-docs/docs/

copyright: Copyright &copy; ATLAS Platform

theme:
  name: material
  icon:
    logo: material/shield-check
    repo: fontawesome/brands/github
    admonition:
      note: material/file-document-outline
      abstract: material/clipboard-text-outline
      tip: material/lightbulb-on-outline
  favicon: assets/images/landing-page.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.path
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.tabs.link
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tooltips
    - header.autohide

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: On this page
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.keys
  - pymdownx.smartsymbols

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/anupp29/Atlas

nav:
  - Home: index.md
  - Architecture:
      - System Overview: architecture/overview.md
      - End-to-End Data Flow: architecture/data-flow.md
      - Layer 2 — Detection Engine: architecture/detection-engine.md
      - Layer 3 — Orchestrator & GraphRAG: architecture/orchestrator.md
      - Layer 4 — Confidence Scoring Engine: architecture/confidence-engine.md
      - Layer 5 — Execution Engine: architecture/execution-engine.md
      - Layer 6 — Learning Engine: architecture/learning-engine.md
      - Neo4j Graph Schema: architecture/graph-schema.md
  - Human Workflow:
      - Escalation Chain (L1 → L2 → L3): escalation/human-workflow.md
  - Codebase Reference:
      - Backend (Python): codebase/backend-reference.md
      - Frontend (TypeScript/React): codebase/frontend-reference.md
      - Scripts & Seed Data: codebase/scripts-and-data.md
  - API Reference: api/reference.md
  - User Interfaces: interfaces/screenshots.md
  - Use Cases: use-cases/index.md
  - Operations:
      - Local Development: development/setup.md
      - Deployment Guide: deployment/guide.md
  - Reference:
      - Technology Stack: tech-stack.md
      - Roadmap: roadmap.md
      - Glossary: glossary.md
